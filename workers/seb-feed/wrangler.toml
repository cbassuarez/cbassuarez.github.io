name = "seb-feed"
main = "src/index.ts"
compatibility_date = "2026-04-24"

[observability]
enabled = true

[vars]
TURNSTILE_ALLOWED_HOSTNAMES = "cbassuarez.com,www.cbassuarez.com"
CONTACT_FORMSPREE_ENDPOINT = "https://formspree.io/f/mjkepaeo"
SITE_VERSION_URL = "https://cbassuarez.com/version.json"
SITE_REPO_URL = "https://github.com/cbassuarez/cbassuarez.github.io"
# this person — SHOW_TIME stamps entries with a coarse hour. The admin token,
# Google Data Portability OAuth values, live ad-tech IDs, and Google Ad
# Manager credentials are all secrets:
# `wrangler secret put THIS_PERSON_ADMIN_TOKEN`
# `wrangler secret put GOOGLE_DP_CLIENT_ID`
# `wrangler secret put GOOGLE_DP_CLIENT_SECRET`
# `wrangler secret put GOOGLE_DP_REDIRECT_URI`
# `wrangler secret put GOOGLE_DP_STATE_SECRET`
# `wrangler secret put GOOGLE_DP_TOKEN_ENCRYPTION_KEY`
# `wrangler secret put THIS_PERSON_GA4_MEASUREMENT_ID`   # e.g. G-XXXXXXXXXX
# `wrangler secret put THIS_PERSON_GOOGLE_ADS_ID`        # e.g. AW-XXXXXXXXXX
# `wrangler secret put THIS_PERSON_META_PIXEL_ID`        # numeric pixel id
#
# Google Ad Manager — the lab serves one GPT slot inside the extraction
# review and resolves the bid into the advertiser's display name via the
# service account.
# `wrangler secret put GAM_NETWORK_CODE`                 # numeric network code
# `wrangler secret put GAM_AD_UNIT_PATH`                 # e.g. /22222222/this_person/extraction
# `wrangler secret put GAM_SERVICE_ACCOUNT_EMAIL`        # ...@PROJECT.iam.gserviceaccount.com
# `wrangler secret put GAM_SERVICE_ACCOUNT_PRIVATE_KEY`  # paste full PEM including BEGIN/END lines
# `wrangler secret put GAM_SLOT_SIZES`                   # optional, e.g. "300x250,728x90"
THIS_PERSON_SHOW_TIME = "false"

[[kv_namespaces]]
binding = "HITS_KV"
id = "5034b4f88e04478d84f90350268b5aa3"

[[durable_objects.bindings]]
name = "STRING_ROOM"
class_name = "StringRoom"

[[durable_objects.bindings]]
name = "CO_ROOM"
class_name = "CoRoom"

[[durable_objects.bindings]]
name = "BFV_ROOM"
class_name = "BodyForVisitsRoom"

[[durable_objects.bindings]]
name = "THIS_PERSON_ROOM"
class_name = "ThisPersonRoom"

[ai]
binding = "AI"

[[migrations]]
tag = "v1-string-room"
new_sqlite_classes = ["StringRoom"]

[[migrations]]
tag = "v2-co-room"
new_sqlite_classes = ["CoRoom"]

[[migrations]]
tag = "v3-bfv-room"
new_sqlite_classes = ["BodyForVisitsRoom"]

[[migrations]]
tag = "v4-this-person-room"
new_sqlite_classes = ["ThisPersonRoom"]

[triggers]
crons = ["*/5 * * * *"]

[[ratelimits]]
name = "RATE_LIMIT_FEED"
namespace_id = "1001"

  [ratelimits.simple]
  limit = 30
  period = 60

[[ratelimits]]
name = "RATE_LIMIT_HIT"
namespace_id = "1002"

  [ratelimits.simple]
  limit = 5
  period = 60

[[ratelimits]]
name = "RATE_LIMIT_GUESTBOOK_POST"
namespace_id = "1003"

  [ratelimits.simple]
  limit = 3
  period = 60

[[ratelimits]]
name = "RATE_LIMIT_CONTACT_POST"
namespace_id = "1007"

  [ratelimits.simple]
  limit = 4
  period = 60

[[ratelimits]]
name = "RATE_LIMIT_STRING_SOCKET"
namespace_id = "1004"

  [ratelimits.simple]
  limit = 12
  period = 60

[[ratelimits]]
name = "RATE_LIMIT_COROOM_SOCKET"
namespace_id = "1008"

  [ratelimits.simple]
  limit = 12
  period = 60

[[ratelimits]]
name = "RATE_LIMIT_BFV_QUALIFY"
namespace_id = "1009"

  [ratelimits.simple]
  limit = 60
  period = 60

[[ratelimits]]
name = "RATE_LIMIT_BFV_SOCKET"
namespace_id = "1010"

  [ratelimits.simple]
  limit = 120
  period = 60

# this person — a single global cap on writes (preview + entries), keyed by a
# constant rather than the visitor IP. A gallery's phones share one NAT egress
# IP, so per-IP limiting would punish them collectively; a global cap protects
# the worker from floods while retaining no identifier.
[[ratelimits]]
name = "RATE_LIMIT_THIS_PERSON"
namespace_id = "1011"

  [ratelimits.simple]
  limit = 30
  period = 60
