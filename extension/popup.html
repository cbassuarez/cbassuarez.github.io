<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>this person — extractor</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0;
      width: 280px;
      font-family: ui-monospace, Menlo, Consolas, monospace;
      background: #f4f3f0;
      color: #0c0c0c;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0a0a0b; color: #ededea; }
    }
    .wrap { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    h1 { margin: 0; font-size: 0.78rem; letter-spacing: 0.18em; text-transform: uppercase; }
    p { margin: 0; font-size: 0.74rem; line-height: 1.5; }
    button {
      font: inherit; font-size: 0.82rem; text-transform: lowercase;
      background: #0c0c0c; color: #f4f3f0; border: 1.5px solid #0c0c0c;
      padding: 0.7em 1em; cursor: pointer;
    }
    @media (prefers-color-scheme: dark) {
      button { background: #ededea; color: #0a0a0b; border-color: #ededea; }
    }
    #status { font-size: 0.7rem; min-height: 1.2em; opacity: 0.7; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>this person</h1>
    <p>This sends the visible text of the current tab to the extraction chamber's import route. It reads visible text only — no cookies, no passwords, no hidden data.</p>
    <button id="extract" type="button">extract this tab</button>
    <p id="status"></p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
