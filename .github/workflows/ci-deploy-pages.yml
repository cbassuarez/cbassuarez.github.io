name: CI and Deploy

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install TMAYD Worker dependencies
        run: npm ci --prefix workers/tmayd-api

      - name: Build
        run: npm run build
        env:
          VITE_BUILD_SHA: ${{ github.sha }}
          VITE_BUILD_AT: ${{ github.event.head_commit.timestamp }}
          VITE_BUILD_REPO_URL: https://github.com/${{ github.repository }}

      - name: Test this-person build target
        run: npm run test:this-person

      - name: Test seb-feed Worker
        run: npm run test:seb-feed

      - name: Dry-run seb-feed Worker deploy
        run: npm run dry-run:seb-feed

      - name: Test TMAYD Worker
        run: npm run test:tmayd-api

      - name: Typecheck TMAYD Worker
        run: npm run typecheck:tmayd-api

      - name: Dry-run TMAYD Worker deploy
        run: npm run dry-run:tmayd-api

      - name: Write version manifest
        if: github.event_name != 'pull_request'
        run: node scripts/write-version.mjs
        env:
          BUILD_SHA: ${{ github.sha }}
          BUILD_AT: ${{ github.event.head_commit.timestamp }}
          BUILD_BEFORE: ${{ github.event.before }}

      - name: SPA fallback for GitHub Pages
        if: github.event_name != 'pull_request'
        run: cp dist/index.html dist/404.html

      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    if: github.event_name != 'pull_request'
    needs: ci
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
