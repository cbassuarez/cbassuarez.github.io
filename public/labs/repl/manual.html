<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>seb's repl manual</title>
  <style>
    :root {
      --cs-white: #ffffff;
      --cs-ink: #070707;
      --cs-line: #070707;
      --cs-red: #e3342f;
      --cs-blue: #0057ff;
      --cs-yellow: #ffd400;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: #f2f2f2;
      color: var(--cs-ink);
      font-family: "Courier New", Courier, monospace;
    }

    body {
      padding: 1.2rem clamp(1rem, 3vw, 2.4rem) 2.4rem;
    }

    .docs-panel {
      background: var(--cs-white);
      color: var(--cs-ink);
      border: 2px solid var(--cs-line);
      box-shadow: 7px 7px 0 var(--cs-line), 12px 12px 0 rgba(0, 87, 255, 0.2);
      font-family: "Courier New", Courier, monospace;
    }

    .docs-frame {
      min-height: min(44rem, 88vh);
      display: flex;
      flex-direction: column;
      background:
        linear-gradient(90deg, rgba(0,0,0,0.035) 1px, transparent 1px) 0 0 / 2rem 2rem,
        linear-gradient(180deg, rgba(0,0,0,0.035) 1px, transparent 1px) 0 0 / 2rem 2rem,
        var(--cs-white);
    }

    .docs-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
      padding: clamp(1rem, 2.2vw, 1.8rem);
      border-bottom: 2px solid var(--cs-line);
      background: var(--cs-white);
      position: relative;
    }

    .docs-head::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 0.72rem;
      background: linear-gradient(180deg, var(--cs-red) 0 33%, var(--cs-yellow) 33% 66%, var(--cs-blue) 66% 100%);
      border-right: 2px solid var(--cs-line);
    }

    .docs-eyebrow {
      display: inline-block;
      margin: 0 0 0.35rem 0.8rem;
      padding: 0.12rem 0.36rem;
      background: var(--cs-line);
      color: var(--cs-white);
      font-size: 0.7rem;
      font-weight: 900;
      letter-spacing: 0.13em;
      text-transform: uppercase;
    }

    .docs-title {
      margin: 0 0 0.2rem 0.8rem;
      font-family: Georgia, "Times New Roman", Times, serif;
      font-size: clamp(3rem, 6vw, 6.2rem);
      font-weight: 400;
      letter-spacing: -0.065em;
      line-height: 0.86;
      text-transform: lowercase;
    }

    .docs-subtitle {
      max-width: 46rem;
      margin: 0.45rem 0 0 0.85rem;
      font-size: clamp(0.88rem, 1.2vw, 1.05rem);
      font-weight: 900;
      letter-spacing: 0.02em;
      line-height: 1.35;
    }

    .docs-tools {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.65rem clamp(1rem, 2.2vw, 1.8rem);
      border-bottom: 2px solid var(--cs-line);
      background: var(--cs-white);
    }

    .docs-search-label {
      display: inline-flex;
      align-items: center;
      align-self: stretch;
      margin: -0.65rem 0;
      padding: 0 0.65rem;
      background: var(--cs-line);
      color: var(--cs-yellow);
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .docs-search {
      flex: 1 1 auto;
      min-width: 0;
      min-height: 2.1rem;
      padding: 0.34rem 0.55rem;
      border: 2px solid var(--cs-line);
      background: var(--cs-white);
      color: var(--cs-ink);
      box-shadow: 3px 3px 0 var(--cs-line);
      font: inherit;
      font-weight: 900;
    }

    .docs-search:focus {
      outline: 2px solid var(--cs-blue);
      outline-offset: 2px;
    }

    .docs-layout {
      display: grid;
      grid-template-columns: minmax(13rem, 18rem) minmax(0, 1fr);
      min-height: 0;
      flex: 1 1 auto;
    }

    .docs-nav {
      border-right: 2px solid var(--cs-line);
      background: var(--cs-white);
      padding: 0.8rem;
      overflow: auto;
    }

    .docs-nav-button {
      width: 100%;
      display: grid;
      grid-template-columns: 2.2rem minmax(0, 1fr);
      gap: 0.45rem;
      align-items: center;
      margin: 0 0 0.42rem;
      padding: 0.36rem 0.45rem;
      border: 2px solid var(--cs-line);
      background: var(--cs-white);
      color: var(--cs-ink);
      box-shadow: 2px 2px 0 var(--cs-line);
      font: inherit;
      font-size: 0.82rem;
      font-weight: 900;
      letter-spacing: 0.045em;
      text-align: left;
      text-transform: uppercase;
      cursor: pointer;
    }

    .docs-nav-button:nth-child(3n + 1):hover,
    .docs-nav-button:nth-child(3n + 1):focus { background: var(--cs-red); color: var(--cs-white); }
    .docs-nav-button:nth-child(3n + 2):hover,
    .docs-nav-button:nth-child(3n + 2):focus { background: var(--cs-yellow); color: var(--cs-ink); }
    .docs-nav-button:nth-child(3n):hover,
    .docs-nav-button:nth-child(3n):focus { background: var(--cs-blue); color: var(--cs-white); }

    .docs-nav-button.is-active {
      background: var(--cs-line);
      color: var(--cs-white);
      box-shadow: 4px 4px 0 var(--cs-blue);
    }

    .docs-nav-num {
      color: inherit;
      font-variant-numeric: tabular-nums;
    }

    .docs-content {
      overflow: auto;
      padding: clamp(1rem, 2.5vw, 2.2rem);
      background: rgba(255, 255, 255, 0.92);
    }

    .docs-section {
      max-width: 68rem;
      margin: 0 auto 2.2rem;
      padding-bottom: 2rem;
      border-bottom: 2px solid var(--cs-line);
    }

    .docs-section:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .docs-section-kicker {
      display: inline-flex;
      align-items: center;
      padding: 0.14rem 0.42rem;
      background: var(--cs-line);
      color: var(--cs-yellow);
      font-weight: 900;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .docs-content h3 {
      margin: 0.55rem 0 0.65rem;
      font-family: Georgia, "Times New Roman", Times, serif;
      font-size: clamp(2.1rem, 4vw, 4.4rem);
      font-weight: 400;
      letter-spacing: -0.055em;
      line-height: 0.92;
      text-transform: lowercase;
    }

    .docs-content h4 {
      display: inline-flex;
      margin: 1.25rem 0 0.5rem;
      padding: 0.13rem 0.45rem;
      background: var(--cs-white);
      color: var(--cs-ink);
      border: 2px solid var(--cs-line);
      box-shadow: 3px 3px 0 var(--cs-line);
      font-size: 0.92rem;
      font-weight: 900;
      letter-spacing: 0.09em;
      text-transform: uppercase;
    }

    .docs-content p,
    .docs-content li {
      font-family: Georgia, "Times New Roman", Times, serif;
      font-size: 1.04rem;
      line-height: 1.55;
    }

    .docs-content p {
      margin: 0.55rem 0;
    }

    .docs-content ul,
    .docs-content ol {
      margin: 0.55rem 0 0.9rem;
      padding-left: 1.35rem;
    }

    .docs-content code {
      font-family: "Courier New", Courier, monospace;
      font-weight: 900;
      background: var(--cs-white);
      border: 1.5px solid var(--cs-line);
      box-shadow: 2px 2px 0 var(--cs-line);
      padding: 0.02rem 0.26rem;
    }

    .docs-code {
      margin: 0.85rem 0 1rem;
      border: 2px solid var(--cs-line);
      border-left: 0.75rem solid var(--cs-blue);
      box-shadow: 4px 4px 0 var(--cs-line);
      background: var(--cs-white);
      overflow: auto;
    }

    .docs-code pre {
      margin: 0;
      padding: 0.82rem 0.95rem;
      font: 900 0.92rem/1.42 "Courier New", Courier, monospace;
      white-space: pre;
    }

    .docs-callout {
      margin: 1rem 0;
      padding: 0.8rem 0.9rem;
      border: 2px solid var(--cs-line);
      border-left: 0.75rem solid var(--cs-yellow);
      background: var(--cs-white);
      box-shadow: 4px 4px 0 var(--cs-line);
      font-family: Georgia, "Times New Roman", Times, serif;
      font-size: 1.06rem;
      line-height: 1.5;
    }

    .docs-table {
      width: 100%;
      border-collapse: collapse;
      margin: 0.9rem 0 1.1rem;
      background: var(--cs-white);
      box-shadow: 4px 4px 0 var(--cs-line);
    }

    .docs-table th,
    .docs-table td {
      border: 2px solid var(--cs-line);
      padding: 0.42rem 0.55rem;
      vertical-align: top;
    }

    .docs-table th {
      background: var(--cs-line);
      color: var(--cs-white);
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-align: left;
    }

    .docs-table td:first-child {
      font-family: "Courier New", Courier, monospace;
      font-weight: 900;
      white-space: nowrap;
    }

    .docs-empty {
      display: none;
      max-width: 38rem;
      margin: 3rem auto;
      padding: 1rem;
      border: 2px solid var(--cs-line);
      box-shadow: 4px 4px 0 var(--cs-line);
      background: var(--cs-white);
      font-weight: 900;
      text-transform: uppercase;
    }

    .docs-content.is-empty .docs-empty {
      display: block;
    }

    .docs-content.is-empty .docs-section {
      display: none;
    }

    @media (max-width: 54rem) {
      .docs-layout {
        grid-template-columns: minmax(0, 1fr);
      }

      .docs-nav {
        border-right: 0;
        border-bottom: 2px solid var(--cs-line);
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(9rem, 1fr));
        gap: 0.42rem;
        max-height: 16rem;
      }

      .docs-nav-button {
        margin: 0;
      }

      .docs-tools {
        align-items: stretch;
        flex-direction: column;
      }

      .docs-search-label {
        margin: 0;
        min-height: 1.7rem;
      }
    }
  </style>
</head>
<body>
  <div id="docs-panel" class="docs-panel" aria-label="seb's repl documentation">
    <div class="docs-frame">
      <header class="docs-head">
        <div>
          <div class="docs-eyebrow">printed guide / local manual</div>
          <h2 class="docs-title">seb's repl</h2>
          <p class="docs-subtitle">a score-grid language for live input, samples, strings, weather, and video</p>
        </div>
      </header>
      <div class="docs-tools">
        <label class="docs-search-label" for="docs-search">search docs</label>
        <input id="docs-search" class="docs-search" type="search" autocomplete="off" spellcheck="false" placeholder="voice, attractor, grain, replay&hellip;" />
      </div>
      <div class="docs-layout">
        <nav id="docs-nav" class="docs-nav" aria-label="Documentation sections"></nav>
        <article id="docs-content" class="docs-content" tabindex="-1"></article>
      </div>
    </div>
  </div>
  <script src="./docs.js?v=20260508r2"></script>
</body>
</html>
